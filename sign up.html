<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }
        .container {
            width: 350px;
            margin: 80px auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .options {
            text-align: center;
            margin-top: 10px;
        }
        .options a {
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sign Up</h2>

    <form onsubmit="return signupSuccess(event)">
        <input type="text" placeholder="Username" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <input type="password" placeholder="Confirm Password" required>
        <button type="submit">Sign Up</button>
    </form>

    <div class="options">
        <p>Already have an account? <a href="signin.html">Sign In</a></p>
    </div>

    <p id="msg" style="text-align:center; color:green;"></p>
</div>

<script>
function signupSuccess(event) {
    event.preventDefault(); // page reload বন্ধ করবে
    document.getElementById("msg").innerText = "Successfully Signed Up!";
    return false;
}
</script>

</body>
</html>
